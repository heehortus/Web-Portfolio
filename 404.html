<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 — Jeong Hee Won</title>
    <style>
      @font-face {
        font-family: "A2Z";
        src: url("/fonts/에이투지체-4Regular.woff2") format("woff2");
        font-weight: 400;
        font-display: swap;
      }
      @font-face {
        font-family: "A2Z";
        src: url("/fonts/에이투지체-7Bold.woff2") format("woff2");
        font-weight: 700;
        font-display: swap;
      }

      * { margin: 0; padding: 0; box-sizing: border-box; }

      body {
        background-color: #191919;
        color: #f6f5f5;
        font-family: "A2Z", sans-serif;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 2rem;
        text-align: center;
      }

      h1 {
        font-size: clamp(1.5rem, 4vw, 3rem);
        font-weight: 400;
        line-height: 1.2;
        margin-bottom: 1rem;
      }

      p {
        font-size: 14px;
        color: #7a7a7a;
        line-height: 1.8;
        max-width: 400px;
        margin-bottom: 2.5rem;
      }

      a {
        font-size: 13px;
        color: #f6f5f5;
        text-decoration: none;
        border-bottom: 1px solid rgba(246,245,245,0.2);
        padding-bottom: 2px;
        letter-spacing: 0.05em;
        transition: border-color 0.2s;
      }

      a:hover { border-color: #f6f5f5; }

      @media (max-width: 768px) {
        body { padding: 1.5rem; }
      }
    </style>
  </head>
  <body>
    <h1>아직 준비 중인 페이지예요.</h1>
    <p>해당 프로젝트는 현재 업로드 준비 중이에요.<br>곧 만나볼 수 있어요!</p>
    <a href="/">← 메인으로 돌아가기</a>
  </body>
</html>
